<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Despensa"/>
  <meta name="theme-color" content="#6366f1"/>
  <title>Mi Despensa</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#0a0a0f; color:#f1f5f9; font-family:system-ui,sans-serif; overscroll-behavior:none; }
    select, input, button { font-family:inherit; }
    #root { max-width:640px; margin:0 auto; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (sin necesidad de Node.js) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useReducer } = React;

    // ── CONSTANTES ──────────────────────────────────────────────────────────
    const ETIQUETAS = ["CARNE CERDO","CARNE AVE","CARNE TERNERA","PESCADO","PESCADO HORNO",
      "SALTEADOS","VERDURAS CONGELADAS","PASTA","LATAS","CONDIMENTO COMIDA","DESAYUNOS","OTROS"];
    const ETQ_STYLE = {
      "CARNE CERDO":{color:"#f87171",bg:"#450a0a"},"CARNE AVE":{color:"#fb923c",bg:"#431407"},
      "CARNE TERNERA":{color:"#fbbf24",bg:"#422006"},"PESCADO":{color:"#38bdf8",bg:"#0c4a6e"},
      "PESCADO HORNO":{color:"#67e8f9",bg:"#164e63"},"SALTEADOS":{color:"#a3e635",bg:"#1a2e05"},
      "VERDURAS CONGELADAS":{color:"#4ade80",bg:"#052e16"},"PASTA":{color:"#facc15",bg:"#422006"},
      "LATAS":{color:"#94a3b8",bg:"#1e293b"},"CONDIMENTO COMIDA":{color:"#f472b6",bg:"#500724"},
      "DESAYUNOS":{color:"#c084fc",bg:"#2e1065"},"OTROS":{color:"#64748b",bg:"#0f172a"},
    };
    const LOCATIONS = [
      {id:"fridge", label:"Frigorífico", icon:"🧊", color:"#3b82f6", bg:"#1e3a5f"},
      {id:"freezer",label:"Congelador",  icon:"❄️", color:"#06b6d4", bg:"#164e63"},
      {id:"pantry", label:"Almacén",     icon:"🗄️", color:"#f59e0b", bg:"#451a03"},
    ];
    const UNITS = ["uds","g","kg","ml","L","latas","bolsas"];
    const DAYS_ES   = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    const MONTHS_ES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

    // ── HELPERS ──────────────────────────────────────────────────────────────
    function getDays(d) {
      const t=new Date();t.setHours(0,0,0,0);
      const e=new Date(d);e.setHours(0,0,0,0);
      return Math.ceil((e-t)/86400000);
    }
    function fut(n){ return new Date(Date.now()+n*86400000).toISOString().split("T")[0]; }
    function dateKey(d){ return d.toISOString().split("T")[0]; }
    function fmtDate(d){ const x=new Date(d+"T00:00:00"); return DAYS_ES[x.getDay()]+" "+x.getDate()+" "+MONTHS_ES[x.getMonth()]; }
    function next7(){ return Array.from({length:7},(_,i)=>{ const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+i);return dateKey(d); }); }
    function expSt(days){
      if(days<0)  return {c:"#ef4444",b:"#450a0a",t:"Caducado"};
      if(days<=3) return {c:"#f97316",b:"#431407",t:days+"d"};
      if(days<=7) return {c:"#eab308",b:"#422006",t:days+"d"};
      return {c:"#22c55e",b:"#052e16",t:days+"d"};
    }
    const SC={green:"#22c55e",yellow:"#eab308",red:"#ef4444",neutral:"#475569"};
    const SB={green:"#052e16",yellow:"#422006",red:"#450a0a",neutral:"#1e293b"};

    // ── PERSISTENCIA LOCAL ───────────────────────────────────────────────────
    function loadState() {
      try {
        const saved = localStorage.getItem("despensa-state");
        if(saved) return JSON.parse(saved);
      } catch(e){}
      return null;
    }
    function saveState(state) {
      try { localStorage.setItem("despensa-state", JSON.stringify(state)); } catch(e){}
    }

    // ── DATOS INICIALES ──────────────────────────────────────────────────────
    const INIT_ITEMS = [
      {id:1,name:"Leche",     etiqueta:"DESAYUNOS",           location:"fridge", qty:2,  unit:"L",    expiry:fut(5),   alertQty:1},
      {id:2,name:"Pechuga",   etiqueta:"CARNE AVE",           location:"freezer",qty:500,unit:"g",    expiry:fut(30),  alertQty:200},
      {id:3,name:"Macarrones",etiqueta:"PASTA",               location:"pantry", qty:1,  unit:"kg",   expiry:fut(180), alertQty:null},
      {id:4,name:"Yogur",     etiqueta:"DESAYUNOS",           location:"fridge", qty:4,  unit:"uds",  expiry:fut(2),   alertQty:2},
      {id:5,name:"Merluza",   etiqueta:"PESCADO HORNO",       location:"freezer",qty:0,  unit:"g",    expiry:fut(-1),  alertQty:null},
      {id:6,name:"Guisantes", etiqueta:"VERDURAS CONGELADAS", location:"freezer",qty:400,unit:"g",    expiry:fut(60),  alertQty:null},
      {id:7,name:"Atún",      etiqueta:"LATAS",               location:"pantry", qty:6,  unit:"latas",expiry:fut(365), alertQty:2},
      {id:8,name:"Solomillo", etiqueta:"CARNE TERNERA",       location:"freezer",qty:600,unit:"g",    expiry:fut(20),  alertQty:null},
      {id:9,name:"Arroz",     etiqueta:"PASTA",               location:"pantry", qty:1,  unit:"kg",   expiry:fut(200), alertQty:null},
      {id:10,name:"Bacalao",  etiqueta:"PESCADO HORNO",       location:"freezer",qty:400,unit:"g",    expiry:fut(45),  alertQty:null},
    ];
    const INIT_RECETAS = [
      {id:101,nombre:"Macarrones con tomate",   ingredientes:[{itemId:3,qty:200,unit:"g"}]},
      {id:102,nombre:"Pechuga a la plancha",    ingredientes:[{itemId:2,qty:300,unit:"g"}]},
      {id:103,nombre:"Merluza al horno",        ingredientes:[{itemId:5,qty:300,unit:"g"}]},
      {id:104,nombre:"Solomillo con guisantes", ingredientes:[{itemId:8,qty:300,unit:"g"},{itemId:6,qty:150,unit:"g"}]},
      {id:105,nombre:"Arroz con atún",          ingredientes:[{itemId:9,qty:150,unit:"g"},{itemId:7,qty:1,unit:"latas"}]},
    ];
    function buildMenu(){
      const days=next7(); const menu={};
      days.forEach(d=>{ menu[d]={almuerzo:{nombre:"",ingredientes:[]},cena:{nombre:"",ingredientes:[]}}; });
      menu[days[0]].almuerzo={nombre:"Macarrones con tomate",ingredientes:[{itemId:3,qty:200,unit:"g"}]};
      menu[days[1]].almuerzo={nombre:"Pechuga a la plancha", ingredientes:[{itemId:2,qty:300,unit:"g"}]};
      menu[days[2]].cena    ={nombre:"Merluza al horno",     ingredientes:[{itemId:5,qty:300,unit:"g"}]};
      return menu;
    }
    function getInitialState(){
      const saved = loadState();
      if(saved) return saved;
      return {items:INIT_ITEMS, recetas:INIT_RECETAS, menu:buildMenu(), nid:200};
    }

    // ── REDUCER ──────────────────────────────────────────────────────────────
    function reducer(state, a){
      let next;
      switch(a.type){
        case "ITEM_ADD":      next={...state,items:[...state.items,{...a.item,id:state.nid}],nid:state.nid+1}; break;
        case "ITEM_UPDATE":   next={...state,items:state.items.map(i=>i.id===a.id?{...i,...a.data}:i)}; break;
        case "ITEM_DELETE":   next={...state,items:state.items.filter(i=>i.id!==a.id)}; break;
        case "ITEM_DEDUCT":   next={...state,items:state.items.map(i=>i.id===a.id?{...i,qty:Math.max(0,Number(i.qty)-Number(a.amount))}:i)}; break;
        case "MENU_SET":      next={...state,menu:{...state.menu,[a.date]:{...state.menu[a.date],[a.meal]:a.data}}}; break;
        case "RECIPE_UPSERT":{
          const ex=state.recetas.find(r=>r.nombre.toLowerCase()===a.r.nombre.toLowerCase());
          if(ex) next={...state,recetas:state.recetas.map(r=>r.id===ex.id?{...r,...a.r}:r)};
          else   next={...state,recetas:[...state.recetas,{...a.r,id:state.nid}],nid:state.nid+1};
          break;
        }
        case "RECIPE_UPDATE": next={...state,recetas:state.recetas.map(r=>r.id===a.id?{...r,...a.data}:r)}; break;
        case "RECIPE_DELETE": next={...state,recetas:state.recetas.filter(r=>r.id!==a.id)}; break;
        default: return state;
      }
      saveState(next);
      return next;
    }

    function mealStatus(ingredientes,items,date){
      if(!ingredientes||ingredientes.length===0) return "neutral";
      const dtm=getDays(date);
      for(const ing of ingredientes){
        const item=items.find(i=>i.id===ing.itemId);
        if(!item) return "red";
        if(getDays(item.expiry)<0) return "red";
        if(getDays(item.expiry)<dtm) return "red";
        if(ing.qty&&Number(item.qty)<Number(ing.qty)) return "red";
      }
      return "green";
    }
    function recipeStatus(r,items){
      if(!r.ingredientes||r.ingredientes.length===0) return "neutral";
      for(const ing of r.ingredientes){
        const item=items.find(i=>i.id===ing.itemId);
        if(!item||getDays(item.expiry)<0) return "red";
        if(ing.qty&&Number(item.qty)<Number(ing.qty)) return "red";
      }
      return "green";
    }

    // ── ESTILOS ──────────────────────────────────────────────────────────────
    const inp={background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 13px",color:"#f1f5f9",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"};
    const btnS=(bg,col)=>({background:bg,border:"none",color:col||"#fff",borderRadius:12,padding:"11px 0",fontSize:13,fontWeight:700,cursor:"pointer",flex:1});

    // ── COMPONENTES AUXILIARES ───────────────────────────────────────────────
    function Overlay({children,onClose}){
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}}
          onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:"18px 18px 0 0",padding:18,width:"100%",maxWidth:640,boxSizing:"border-box",maxHeight:"92vh",overflowY:"auto"}}>
            {children}
          </div>
        </div>
      );
    }
    function Pill({children,c,bg,onClick}){ return <div onClick={onClick} style={{background:bg,border:"1px solid "+c,color:c,borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>{children}</div>; }
    function Tag({children,c,bg}){ return <span style={{fontSize:10,background:bg,color:c,borderRadius:4,padding:"1px 6px"}}>{children}</span>; }
    function Badge({children,c,bg}){ return <span style={{fontSize:9,background:bg,color:c,borderRadius:4,padding:"1px 5px",fontWeight:700}}>{children}</span>; }
    function IBtn({onClick,children}){ return <button onClick={onClick} style={{background:"#1e293b",border:"none",color:"#94a3b8",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:11}}>{children}</button>; }
    function TBtn({active,color,onClick,children,sm}){ return <button onClick={onClick} style={{flexShrink:0,background:active?color:"#1e293b",border:"none",color:"#fff",borderRadius:8,padding:sm?"4px 8px":"7px 12px",fontSize:sm?10:12,fontWeight:active?700:400,cursor:"pointer",opacity:active?1:.55}}>{children}</button>; }
    function ScrollRow({children}){ return <div style={{display:"flex",gap:5,marginBottom:8,overflowX:"auto",paddingBottom:3}}>{children}</div>; }
    function ARow({name,sub,color,onEdit}){
      return (
        <div style={{background:"#111827",borderRadius:10,padding:"9px 12px",display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{name}</div><div style={{fontSize:11,color:"#64748b",marginTop:1}}>{sub}</div></div>
          <button onClick={onEdit} style={{background:"#1e293b",border:"none",color,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>✏️</button>
        </div>
      );
    }
    function NoAlert({msg}){ return <p style={{color:"#475569",textAlign:"center",padding:"25px 0"}}>{msg||"Todo en orden ✅"}</p>; }
    function Empty({msg}){ return <div style={{textAlign:"center",color:"#475569",padding:"45px 0"}}><div style={{fontSize:40,marginBottom:8}}>📭</div><p>{msg||"No hay productos"}</p></div>; }

    // ── APP PRINCIPAL ────────────────────────────────────────────────────────
    function App(){
      const [S,dispatch]=useReducer(reducer,null,getInitialState);
      const [mainTab,    setMainTab]    = useState("inventory");
      const [locTab,     setLocTab]     = useState("all");
      const [etqFilter,  setEtqFilter]  = useState("all");
      const [search,     setSearch]     = useState("");
      const [expFilter,  setExpFilter]  = useState("all");
      const [modal,      setModal]      = useState(null);
      const [itemForm,   setItemForm]   = useState({name:"",etiqueta:"OTROS",location:"fridge",qty:"",unit:"uds",expiry:"",alertQty:""});
      const [editItemId, setEditItemId] = useState(null);
      const [alertsTab,  setAlertsTab]  = useState("menu");
      const [menuDays]                  = useState(()=>next7());
      const [mealModal,  setMealModal]  = useState(null);
      const [mealForm,   setMealForm]   = useState({nombre:"",ingredientes:[]});
      const [ingForm,    setIngForm]    = useState({itemId:"",qty:"",unit:"g"});
      const [suggestions,setSuggestions]= useState([]);
      const [showSug,    setShowSug]    = useState(false);
      const [recipeModal,setRecipeModal]= useState(null);
      const [recipeForm, setRecipeForm] = useState({nombre:"",ingredientes:[]});
      const [rIngForm,   setRIngForm]   = useState({itemId:"",qty:"",unit:"g"});
      const [deductModal,setDeductModal]= useState(null);

      const lowStock  = S.items.filter(i=>i.alertQty!=null&&i.alertQty!==""&&Number(i.qty)<=Number(i.alertQty));
      const expSoon   = S.items.filter(i=>{const d=getDays(i.expiry);return d>=0&&d<=7;});
      const expired   = S.items.filter(i=>getDays(i.expiry)<0);
      const menuAlerts=[];
      menuDays.forEach(date=>["almuerzo","cena"].forEach(meal=>{
        const m=S.menu[date]?.[meal]; if(!m||!m.nombre) return;
        if(mealStatus(m.ingredientes,S.items,date)==="red") menuAlerts.push({date,meal,nombre:m.nombre});
      }));
      const totalAlerts=lowStock.length+expSoon.length+expired.length+menuAlerts.length;

      function handleNombre(val){
        setMealForm(f=>({...f,nombre:val}));
        if(val.trim().length>=2){
          const sug=S.recetas.filter(r=>r.nombre.toLowerCase().includes(val.toLowerCase()));
          setSuggestions(sug); setShowSug(sug.length>0);
        } else setShowSug(false);
      }
      function applySuggestion(r){ setMealForm({nombre:r.nombre,ingredientes:[...r.ingredientes]}); setShowSug(false); }

      function openMeal(date,meal){
        const e=S.menu[date]?.[meal]||{nombre:"",ingredientes:[]};
        setMealForm({nombre:e.nombre||"",ingredientes:[...(e.ingredientes||[])]});
        setIngForm({itemId:"",qty:"",unit:"g"}); setShowSug(false);
        setMealModal({date,meal});
      }
      function addIngToMeal(){
        if(!ingForm.itemId) return;
        const newIng={itemId:Number(ingForm.itemId),qty:ingForm.qty?Number(ingForm.qty):null,unit:ingForm.unit};
        const updated={...mealForm,ingredientes:[...mealForm.ingredientes,newIng]};
        setMealForm(updated); setIngForm({itemId:"",qty:"",unit:"g"});
        if(updated.nombre.trim()) dispatch({type:"RECIPE_UPSERT",r:{nombre:updated.nombre.trim(),ingredientes:updated.ingredientes}});
      }
      function removeIngFromMeal(idx){
        const updated={...mealForm,ingredientes:mealForm.ingredientes.filter((_,i)=>i!==idx)};
        setMealForm(updated);
        if(updated.nombre.trim()&&updated.ingredientes.length>0) dispatch({type:"RECIPE_UPSERT",r:{nombre:updated.nombre.trim(),ingredientes:updated.ingredientes}});
      }
      function saveMeal(){
        dispatch({type:"MENU_SET",date:mealModal.date,meal:mealModal.meal,data:{nombre:mealForm.nombre,ingredientes:mealForm.ingredientes}});
        if(mealForm.nombre.trim()&&mealForm.ingredientes.length>0) dispatch({type:"RECIPE_UPSERT",r:{nombre:mealForm.nombre.trim(),ingredientes:mealForm.ingredientes}});
        setMealModal(null);
      }
      function tryDeduct(date,meal){
        const m=S.menu[date]?.[meal];
        if(!m||!m.nombre||!m.ingredientes?.length) return;
        setDeductModal({date,meal,nombre:m.nombre,ingredientes:m.ingredientes});
      }
      function confirmDeduct(){
        deductModal.ingredientes.forEach(ing=>{ if(ing.qty) dispatch({type:"ITEM_DEDUCT",id:ing.itemId,amount:ing.qty}); });
        setDeductModal(null);
      }
      function openAddItem(){ setItemForm({name:"",etiqueta:"OTROS",location:"fridge",qty:"",unit:"uds",expiry:"",alertQty:""}); setEditItemId(null); setModal("item"); }
      function openEditItem(item){ setItemForm({name:item.name,etiqueta:item.etiqueta,location:item.location,qty:item.qty,unit:item.unit,expiry:item.expiry,alertQty:item.alertQty??""}); setEditItemId(item.id); setModal("item"); }
      function saveItem(){
        if(!itemForm.name||!itemForm.qty||!itemForm.expiry) return;
        const data={...itemForm,qty:Number(itemForm.qty),alertQty:itemForm.alertQty!==""?Number(itemForm.alertQty):null};
        if(editItemId) dispatch({type:"ITEM_UPDATE",id:editItemId,data});
        else dispatch({type:"ITEM_ADD",item:data});
        setModal(null);
      }
      function openNewRecipe(){ setRecipeForm({nombre:"",ingredientes:[]}); setRIngForm({itemId:"",qty:"",unit:"g"}); setRecipeModal("new"); }
      function openEditRecipe(r){ setRecipeForm({nombre:r.nombre,ingredientes:[...r.ingredientes]}); setRIngForm({itemId:"",qty:"",unit:"g"}); setRecipeModal(r.id); }
      function addIngToRecipe(){
        if(!rIngForm.itemId) return;
        setRecipeForm(f=>({...f,ingredientes:[...f.ingredientes,{itemId:Number(rIngForm.itemId),qty:rIngForm.qty?Number(rIngForm.qty):null,unit:rIngForm.unit}]}));
        setRIngForm({itemId:"",qty:"",unit:"g"});
      }
      function saveRecipe(){
        if(!recipeForm.nombre) return;
        if(recipeModal==="new") dispatch({type:"RECIPE_UPSERT",r:recipeForm});
        else dispatch({type:"RECIPE_UPDATE",id:recipeModal,data:recipeForm});
        setRecipeModal(null);
      }

      const filtered=S.items.filter(i=>{
        const locOk=locTab==="all"||i.location===locTab;
        const etqOk=etqFilter==="all"||i.etiqueta===etqFilter;
        const srch=i.name.toLowerCase().includes(search.toLowerCase());
        const d=getDays(i.expiry);
        const expOk=expFilter==="all"||(expFilter==="expired"&&d<0)||(expFilter==="soon"&&d>=0&&d<=7)||(expFilter==="ok"&&d>7);
        return locOk&&etqOk&&srch&&expOk;
      });

      return (
        <div style={{minHeight:"100vh",background:"#0a0a0f",color:"#f1f5f9",paddingBottom:80}}>

          {/* HEADER */}
          <div style={{background:"linear-gradient(135deg,#1e1b4b,#0f172a)",padding:"16px 14px 12px",borderBottom:"1px solid #1e293b"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <h1 style={{margin:0,fontSize:20,fontWeight:700,background:"linear-gradient(90deg,#818cf8,#38bdf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🏠 Mi Despensa</h1>
                <p style={{margin:"1px 0 0",fontSize:11,color:"#64748b"}}>{S.items.length} productos · {S.recetas.length} recetas</p>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>{setAlertsTab(menuAlerts.length>0?"menu":"low");setModal("alerts");}}
                  style={{position:"relative",background:"#1e293b",border:"1px solid #334155",color:"#f1f5f9",borderRadius:11,padding:"8px 12px",fontSize:13,cursor:"pointer"}}>
                  🔔
                  {totalAlerts>0&&<span style={{position:"absolute",top:-5,right:-5,background:"#ef4444",borderRadius:"50%",width:16,height:16,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{totalAlerts}</span>}
                </button>
                {mainTab==="inventory"&&<button onClick={openAddItem} style={{background:"linear-gradient(135deg,#6366f1,#3b82f6)",border:"none",color:"#fff",borderRadius:11,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Añadir</button>}
                {mainTab==="recetas"  &&<button onClick={openNewRecipe} style={{background:"linear-gradient(135deg,#059669,#0d9488)",border:"none",color:"#fff",borderRadius:11,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Receta</button>}
              </div>
            </div>
            {(expired.length>0||expSoon.length>0||lowStock.length>0||menuAlerts.length>0)&&(
              <div style={{display:"flex",gap:6,marginTop:9,flexWrap:"wrap"}}>
                {expired.length>0   &&<Pill c="#ef4444" bg="#450a0a" onClick={()=>{setExpFilter("expired");setMainTab("inventory");setModal(null);}}>{expired.length} caducado{expired.length>1?"s":""} 🔴</Pill>}
                {expSoon.length>0   &&<Pill c="#f97316" bg="#431407" onClick={()=>{setExpFilter("soon");setMainTab("inventory");setModal(null);}}>{expSoon.length} caducan pronto 🟠</Pill>}
                {lowStock.length>0  &&<Pill c="#a78bfa" bg="#2e1065" onClick={()=>{setAlertsTab("low");setModal("alerts");}}>{lowStock.length} stock bajo 🟣</Pill>}

                <button onClick={addIngToRecipe} style={{...btnS("linear-gradient(135deg,#064e3b,#065f46)"),marginTop:7,fontSize:12}}>+ Añadir</button>
              </div>
              <div style={{display:"flex",gap:7,marginTop:13}}>
                <button style={btnS("#1e293b","#94a3b8")} onClick={()=>setRecipeModal(null)}>Cancelar</button>
                <button style={btnS("linear-gradient(135deg,#059669,#0d9488)")} onClick={saveRecipe}>Guardar receta</button>
              </div>
            </Overlay>
          )}

          {/* MODAL DESCONTAR */}
          {deductModal&&(
            <Overlay onClose={()=>setDeductModal(null)}>
              <div style={{textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:40,marginBottom:8}}>🍳</div>
                <h2 style={{margin:"0 0 6px",fontSize:16}}>¿Descontar ingredientes?</h2>
                <p style={{margin:0,fontSize:12,color:"#64748b"}}>Se va a preparar <b style={{color:"#f1f5f9"}}>{deductModal.nombre}</b>.<br/>¿Quieres descontar del inventario?</p>
              </div>
              <div style={{background:"#111827",borderRadius:11,padding:"10px 13px",marginBottom:16}}>
                {deductModal.ingredientes.map((ing,i)=>{
                  const item=S.items.find(x=>x.id===ing.itemId);
                  return item&&ing.qty?(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<deductModal.ingredientes.length-1?"1px solid #1e293b":"none"}}>
                      <span style={{fontSize:13}}>{item.name}</span>
                      <span style={{fontSize:12,color:"#f97316",fontWeight:700}}>− {ing.qty} {ing.unit}</span>
                    </div>
                  ):null;
                })}
              </div>
              <div style={{display:"flex",gap:7}}>
                <button style={btnS("#1e293b","#94a3b8")} onClick={()=>setDeductModal(null)}>No descontar</button>
                <button style={btnS("linear-gradient(135deg,#dc2626,#b91c1c)")} onClick={confirmDeduct}>✓ Descontar</button>
              </div>
            </Overlay>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

    // Registrar Service Worker
    if("serviceWorker" in navigator){
      window.addEventListener("load", ()=>{
        navigator.serviceWorker.register("/service-worker.js")
          .then(()=>console.log("SW registrado"))
          .catch(e=>console.log("SW error:",e));
      });
    }
  </script>
</body>
</html>
